[pytest]
# Put the repo root on sys.path so tests can `import indexing`, `import
# ingestion`, `import retrieval` without installing the project.
pythonpath = .
testpaths = tests
# Only collect the unit tests (test_*.py); the eval scripts under tests/eval/
# (evaluate.py, verify_gold.py) are not pytest tests and are not collected.
python_files = test_*.py
