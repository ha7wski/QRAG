services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: quran-qdrant
    ports:
      - "6333:6333"   # REST / HTTP
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: quran-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped
    # For NVIDIA GPU, uncomment:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  backend:
    build: .
    container_name: quran-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    env_file: .env
    environment:
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - qdrant
      - ollama
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # NEXT_PUBLIC_* is inlined at build time, so the API URL is a build arg
        # (the browser talks to the published backend port on localhost).
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: quran-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  qdrant_storage:
  ollama_models:
